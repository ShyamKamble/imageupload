<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Handle client-side routing for static export on S3
        const path = window.location.pathname;
        
        // If path doesn't end with .html and doesn't have an extension, add .html
        if (!path.endsWith('.html') && !path.includes('.') && path !== '/') {
            const newPath = path.endsWith('/') ? path + 'index.html' : path + '.html';
            window.location.replace(newPath);
        } else if (path === '/') {
            window.location.replace('/index.html');
        } else {
            // Show actual 404 page
            document.write(`
                <style>
                    body {
                        font-family: system-ui, -apple-system, sans-serif;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        min-height: 100vh;
                        margin: 0;
                        background: #f5f5f5;
                    }
                    .container {
                        text-align: center;
                        padding: 2rem;
                    }
                    h1 { font-size: 4rem; margin: 0; color: #333; }
                    p { color: #666; margin: 1rem 0; }
                    a {
                        display: inline-block;
                        margin-top: 1rem;
                        padding: 0.75rem 1.5rem;
                        background: #333;
                        color: white;
                        text-decoration: none;
                        border-radius: 0.5rem;
                    }
                    a:hover { background: #555; }
                </style>
                <div class="container">
                    <h1>404</h1>
                    <p>Page not found</p>
                    <a href="/index.html">Go Home</a>
                </div>
            `);
        }
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 20%; font-family: sans-serif;">
        <p>Redirecting...</p>
    </div>
</body>
</html>
